name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, type-check, test, build
    runs-on: ubuntu-latest

    # Ephemeral Postgres so the persistence integration tests actually run in CI
    # (they self-skip only when DATABASE_URL is unset). This is a throwaway DB,
    # never the real Sim's data.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: operant
          POSTGRES_PASSWORD: operant
          POSTGRES_DB: operant_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U operant"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm run format:check

      - name: Lint
        run: pnpm run lint

      - name: Type-check
        run: pnpm run typecheck

      - name: Test
        run: pnpm run test
        env:
          DATABASE_URL: postgres://operant:operant@localhost:5432/operant_ci
          DATABASE_SSL: 'false'

      - name: Build
        run: pnpm run build

      - name: Install Playwright browser
        run: pnpm --filter @operant/client exec playwright install --with-deps chromium

      - name: End-to-end tests
        run: pnpm --filter @operant/client e2e
